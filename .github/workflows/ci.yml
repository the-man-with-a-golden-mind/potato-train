name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Omit version — uses packageManager (pnpm@10.11.1) from package.json
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm build
      - run: pnpm test:coverage
      - run: pnpm size
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
